---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pipelines.helix.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: helix.io
  names:
    kind: Pipeline
    listKind: PipelineList
    plural: pipelines
    singular: pipeline
    shortNames: [pl]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Current Stage
          type: string
          jsonPath: .status.currentStage
        - name: Last Run
          type: date
          jsonPath: .status.lastRunTime
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [triggers, stages]
              properties:
                description:
                  type: string
                timeout:
                  type: string
                  default: "1h"
                serviceAccountName:
                  type: string
                  default: helix-pipeline-runner
                triggers:
                  type: array
                  items:
                    type: object
                    required: [type]
                    properties:
                      type:
                        type: string
                        enum: [push, pull_request, schedule, manual]
                      branches:
                        type: array
                        items:
                          type: string
                      cron:
                        type: string
                stages:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [name, steps]
                    properties:
                      name:
                        type: string
                      approvalRequired:
                        type: boolean
                        default: false
                      approvalTimeout:
                        type: string
                      condition:
                        type: string
                      steps:
                        type: array
                        minItems: 1
                        items:
                          type: object
                          required: [name, image]
                          properties:
                            name:
                              type: string
                            image:
                              type: string
                            script:
                              type: string
                            command:
                              type: array
                              items:
                                type: string
                            env:
                              type: array
                              items:
                                type: object
                                required: [name]
                                properties:
                                  name:
                                    type: string
                                  value:
                                    type: string
                                  secretRef:
                                    type: object
                                    required: [name, key]
                                    properties:
                                      name:
                                        type: string
                                      key:
                                        type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Succeeded, Failed, Cancelled, AwaitingApproval]
                currentStage:
                  type: string
                runId:
                  type: string
                lastRunTime:
                  type: string
                  format: date-time
                lastRunDuration:
                  type: string
                stageResults:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      result:
                        type: string
                      message:
                        type: string
                      startTime:
                        type: string
                        format: date-time
                      endTime:
                        type: string
                        format: date-time
